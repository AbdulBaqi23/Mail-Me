{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    "
  >
    <div
      style="
        background-color: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        width: 350px;
        text-align: center;
      "
    >
      <!-- Logo and Heading -->
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          margin-bottom: 25px;
        "
      >
        <img
          src="{% static 'media/image1.png' %}"
          alt="Logo"
          style="
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
          "
        />
        <h2 style="margin: 0; font-size: 24px; color: #2c3e50">Sign Up</h2>
      </div>

      <!-- Error Display -->
      {% if form.errors %}
      <div style="color: #e74c3c; margin-bottom: 15px; font-size: 14px">
        {% for field in form %} {% for error in field.errors %}
        <p>{{ error }}</p>
        {% endfor %} {% endfor %}
      </div>
      {% endif %}

      <!-- Form -->
      <form
        method="post"
        style="display: flex; flex-direction: column; gap: 14px"
      >
        {% csrf_token %}
        <input
          type="text"
          name="username"
          placeholder="Username"
          required
          style="
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
          "
        />
        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          style="
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
          "
        />
        <input
          type="password"
          name="password1"
          placeholder="Password"
          required
          style="
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
          "
        />
        <input
          type="password"
          name="password2"
          placeholder="Confirm Password"
          required
          style="
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
          "
        />

        <button
          type="submit"
          style="
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
          "
        >
          Sign Up
        </button>
      </form>

      <!-- Link to Login -->
      <p style="margin-top: 20px; font-size: 14px; color: #555">
        Already have an account?
        <a
          href="{% url 'login' %}"
          style="color: #2c3e50; font-weight: bold; text-decoration: none"
          >Login</a
        >
      </p>
    </div>
  </body>
</html>
