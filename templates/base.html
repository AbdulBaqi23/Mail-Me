{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>{% block title %}Mailbox{% endblock %}</title>
</head>
<body style="margin:0; padding:0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4;">

  <div style="display: flex; min-height: 100vh;">

    <!-- Sidebar -->
    <div style="width: 200px; background: #2c3e50; color: white; padding: 20px; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);">
      <div style="text-align: center; margin-bottom: 30px;">
        <img src="{% static 'media/image1.png' %}" alt="Logo" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 10px;" />
        <h2 style="color: #ecf0f1; font-size: 18px; margin: 0;">MailMe</h2>
      </div>

      <h2 style="color: #ecf0f1; font-size: 20px;">Mailbox</h2>
      <nav style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
        <a href="{% url 'inbox' %}" style="color: white; text-decoration: none;">📥 Inbox</a>
        <a href="{% url 'compose' %}" style="color: white; text-decoration: none;">✉️ Compose</a>
        <a href="{% url 'sent' %}" style="color: white; text-decoration: none;">📤 Sent</a>
        <a href="{% url 'logout' %}" style="color: white; text-decoration: none;">🚪 Logout</a>
      </nav>

      <div style="margin-top:auto;">
        <div style="margin-top:70px; font-size:13px; text-align:center; color:#ecf0f1;">
          📧 Contact us: <a href="mailto:support@mailme.com" style="color:#1abc9c; text-decoration:none;">support@mailme.com</a>
        </div>
        <div style="font-size: 12px; color: #bdc3c7; margin-top: 60px;">
          &copy; 2026 M.AbdulBaqi. All rights reserved.
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div style="flex: 1; padding: 40px;">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
