{% extends 'base.html' %}
{% load static %}
{% block title %}Sent{% endblock %}

{% block content %}
  <form method="get" action="{% url 'sent' %}" style="display: flex; justify-content: center;">
    <input type="text" name="q" placeholder="Search emails..." value="{{ request.GET.q }}"
      style="width: 60%; padding: 10px 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px;">
    <button type="submit"
      style="margin-left: 10px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Search
    </button>
  </form>

  <h2 style="margin-bottom: 20px; color: #2c3e50;">Sent Emails</h2>
  <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 20px;">
    {% for email in emails %}
    <li style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);">
      <strong style="font-size: 16px;">{{ email.subject }}</strong>
      <span style="color: #888;">to {{ email.recipient.username }}</span>
      <p style="margin-top: 8px; color: #555;">{{ email.body }}</p>
    </li>
    {% empty %}
    <li style="text-align: center; color: #aaa;">No sent emails.</li>
    {% endfor %}
  </ul>
{% endblock %}
