{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Compose Mail</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(to right, #f0f4ff, #e0ecff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    "
  >
    <div
      style="
        background: white;
        padding: 40px 35px;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        width: 420px;
        max-width: 90%;
      "
    >
      <h2
        style="
          margin-bottom: 25px;
          text-align: center;
          color: #2c3e50;
          font-size: 26px;
        "
      >
        📬 Compose Email
      </h2>

      {% if error %}
      <p style="color: #e74c3c; text-align: center; margin-bottom: 15px">
        {{ error }}
      </p>
      {% endif %}

      <form
        method="post"
        style="display: flex; flex-direction: column; gap: 18px"
      >
        {% csrf_token %}

        <!-- Render each field with custom inline styles -->
        {% for field in form %}
        <div style="display: flex; flex-direction: column">
          <label style="margin-bottom: 6px; color: #555; font-weight: 600"
            >{{ field.label }}</label
          >
          {{ field }} {% if field.errors %}
          <span style="color: #e74c3c; font-size: 13px"
            >{{ field.errors|striptags }}</span
          >
          {% endif %}
        </div>
        {% endfor %}

        <button
          type="submit"
          style="
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
          "
        >
          ✉️ Send Email
        </button>
      </form>

      <p style="margin-top: 25px; text-align: center">
        <a
          href="{% url 'inbox' %}"
          style="color: #3498db; text-decoration: none; font-weight: 500"
          >← Back to Inbox</a
        >
      </p>
    </div>

    <!-- Inline styles for Django form widgets -->
    <style>
      input[type="text"],
      input[type="email"],
      textarea,
      select {
        padding: 10px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        outline: none;
        transition: border 0.3s;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: #4caf50;
        box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }
    </style>
  </body>
</html>
